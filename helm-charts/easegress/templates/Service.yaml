{{- if not .Values.cluster.useStandaloneEtcd }}
apiVersion: v1
kind: Service
metadata:
  name: easegress-hs
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  ports:
  - name: admin-port
    port: 2381
    protocol: TCP
    targetPort: 2381
  - name: peer-port
    port: 2380
    protocol: TCP
    targetPort: 2380
  - name: client-port
    port: 2379
    protocol: TCP
    targetPort: 2379
  selector:
    app: {{ .Release.Name }}
  type: ClusterIP

---

{{- end }}

{{- $adminType := default "ClusterIP" .Values.service.admin.type -}}
{{- $adminExternallyExposed := or (eq $adminType "NodePort") (eq $adminType "LoadBalancer") -}}
{{- $adminAPIAddr := .Values.admin.apiAddr | toString -}}
{{- $adminAPILoopback := or (regexMatch "^(localhost|127(\\.[0-9]{1,3}){3}):[0-9]+$" $adminAPIAddr) (regexMatch "^(\\[::1\\]|::1):[0-9]+$" $adminAPIAddr) -}}
{{- if and .Values.service.admin.enabled $adminAPILoopback -}}
{{- fail "admin service requires admin.apiAddr to listen on a non-loopback address" -}}
{{- end }}
{{- if and .Values.service.admin.enabled $adminExternallyExposed (empty .Values.admin.basicAuth) (not .Values.admin.allowUnsafeNoAuth) -}}
{{- fail "admin service type NodePort/LoadBalancer requires admin.basicAuth or admin.allowUnsafeNoAuth=true" -}}
{{- end }}

{{- if .Values.service.admin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: easegress-public
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: admin-port
    port: 2381
    protocol: TCP
    targetPort: 2381
    {{- if $adminExternallyExposed }}
    nodePort: {{ default .Values.service.adminPort .Values.service.admin.nodePort }}
    {{- end }}
  selector:
    app: {{ .Release.Name }}
  type: {{ $adminType }}

---
{{- end }}

kind: Service
apiVersion: v1
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: web
      protocol: TCP
      port: 8080
      nodePort: {{ .Values.service.nodePort }}
  type: NodePort
