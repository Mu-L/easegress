service:
  # nodePort for easegress service
  nodePort: 30780
  # Deprecated. Use service.admin.nodePort.
  adminPort: 31255
  admin:
    # disabled by default because the admin API controls the Easegress instance
    enabled: false
    type: ClusterIP
    # nodePort for egctl access when service.admin.type is NodePort
    nodePort: 31255

admin:
  # listen on localhost by default; set to 0.0.0.0:2381 only when exposing the admin API intentionally
  apiAddr: 127.0.0.1:2381
  # map of username to password for admin API basic authentication
  basicAuth: {}
  # set true only if an external admin service is protected outside this chart
  allowUnsafeNoAuth: false

serviceAccount:
  automountServiceAccountToken: false

rbac:
  # enable only for features that must read Kubernetes TLS secrets, such as IngressController
  readSecrets: false

# image for easegress deployment
image:
  repository: megaease/easegress
  tag: latest

# Easegress cluster configurations.
# When volumeType is
# - emptyDir: use pods internal filesystem that is not persisted when pod crashes. Use `emptyDir` only when primaryReplicas is 1.
# - persistentVolume, create as many persistenVolumes and persistentVolumeClaims as there are nodeHostnames.
cluster:
  primaryReplicas: 1 # or 3,5,7
  volumeType: emptyDir # or persistentVolume
  volumeLocalPath: /opt/easegress
  # nodeHostnames are hostnames of VMs/Kubernetes nodes. Only used when `volumeType: persistentVolume`.
  # Note that this require nodes to be static.
  nodeHostnames:
  # - hostname-1
  # - hostname-2
  # - hostname-3

  secondaryReplicas: 0

  useStandaloneEtcd: false
  standaloneEtcdEndpoints:
  # - endpoint-1

# log path inside container
log:
  path: /opt/easegress/log
